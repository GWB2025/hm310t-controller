      <button class="btn btn-primary btn-sm" id="seqPlay" data-need-conn disabled>Play <span class="kbd-hint">⌘P</span></button>
      <button class="btn btn-danger btn-sm" id="seqStop">Stop</button>
      <button class="btn btn-sm" id="seqAdd">+ Step</button>
      <button class="btn btn-sm" id="seqClear">Clear</button>
      <button class="btn btn-sm" id="seqExport">Export CSV</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">Data logger <span class="aux" id="logCount">0 pts</span></div>
    <div class="field-row">
      <div class="field"><label>Interval <span class="unit-tag">ms</span></label><input type="number" id="logInterval" value="1000"></div>
      <div class="field"><label>Max points</label><input type="number" id="logMax" value="10000"></div>
      <button class="btn btn-primary btn-sm" id="logStartBtn" data-need-conn disabled>Start <span class="kbd-hint">⌘S</span></button>
      <button class="btn btn-danger btn-sm" id="logStopBtn" disabled>Stop</button>
    </div>
    <div class="table-wrap" style="max-height:160px"><table><thead><tr><th>t/s</th><th>V</th><th>A</th><th>W</th><th>out</th></tr></thead><tbody id="logTbody"></tbody></table></div>
    <div class="field-row"><button class="btn btn-sm" id="logCsv">Export CSV</button><button class="btn btn-sm" id="logJson">Export JSON</button><button class="btn btn-sm" id="logClear">Clear</button></div>
  </div>

  <div class="panel">
    <div class="panel-title">Alarms &amp; settings</div>
    <label class="check-row"><input type="checkbox" id="alarmEnable">Alarm thresholds</label>
    <div class="field-row">
      <div class="field"><label>V min</label><input type="number" id="alVmin" step="0.1"></div>
      <div class="field"><label>V max</label><input type="number" id="alVmax" step="0.1"></div>
      <div class="field"><label>A min</label><input type="number" id="alAmin" step="0.01"></div>
      <div class="field"><label>A max</label><input type="number" id="alAmax" step="0.01"></div>
    </div>
    <label class="check-row"><input type="checkbox" id="alarmKill">Kill output on alarm</label>
    <div class="divider"></div>
    <label class="check-row"><input type="checkbox" id="offOnClose" checked>Turn output off on disconnect</label>
    <div class="field-row">
      <div class="field"><label>Poll interval <span class="unit-tag">ms</span></label><input type="number" id="pollMs" value="300"></div>
      <div class="field"><label>Baud</label><select id="baud"><option>9600</option><option>19200</option><option>38400</option><option>57600</option><option>115200</option></select></div>
    </div>
    <div class="divider"></div>
    <div class="panel-title" style="font-size:11px">Simulation</div>
    <div class="field-row">
      <div class="field"><label>Load Ω</label><input type="number" id="simLoad" value="10" step="1"></div>
      <div class="field"><label>Sim speed ×</label><input type="number" id="simSpeed" value="1" step="1"></div>
      <div class="field"><label>Batt mAh</label><input type="number" id="simCapacity" value="2000" step="100"></div>
    </div>
    <label class="check-row"><input type="checkbox" id="simBattery">Simulate a battery (for the charger)</label>
  </div>

  <div class="panel col-span-2">
    <div class="panel-title">Communication log</div>
    <div class="comm-log" id="commLog"></div>
  </div>`;

  // populate presets & chemistries
  const presets = [[3.3,1],[5.0,2],[9.0,3],[12.0,5],[15.0,5],[24.0,5],[5.0,0.5],[3.3,0.1]];
  $("presetGrid").innerHTML = presets.map(([v,a]) => `<button class="preset-btn" data-v="${v}" data-a="${a}"><span class="v">${v.toFixed(1)}V</span><span class="a">${a.toFixed(1)} A</span></button>`).join("");
  $("chChem").innerHTML = Object.keys(CHEMISTRIES).map(k => `<option>${k}</option>`).join("");
}

/* ---- wiring -------------------------------------------------------------- */
function wire() {
  $("btnConnect").onclick = () => connect(App.sim && !App.connected ? true : false);
  $("btnTheme").onclick = toggleTheme;
  $("btnSim").onclick = () => { if (App.connected) return; App.sim = !App.sim; $("btnSim").textContent = "Simulation: " + (App.sim ? "ON" : "OFF"); $("btnSim").classList.toggle("active", App.sim); if (App.sim) connect(true); };
  $("btnDisconnect").onclick = () => disconnect("by user");
  $("btnKill").onclick = () => killOutput();
  $("btnApply").onclick = applySetpoints;
  $("outToggle").onclick = () => { if (App.connected) setOutput(!(App.lastM && App.lastM.output)); };
  $("btnResetE").onclick = () => { App.energyWh = 0; $("dispE").textContent = "0.000"; };
  $("btnResetC").onclick = () => { App.capacityAh = 0; $("dispC").textContent = "0.000"; };
  $("presetGrid").onclick = e => { const b = e.target.closest(".preset-btn"); if (!b) return; $("inV").value = b.dataset.v; $("inA").value = b.dataset.a; applySetpoints(); };
  $("btnProtApply").onclick = applyProtection; $("btnProtRead").onclick = readProtection;
  $("chBtn").onclick = () => App.charge ? endChargeUser() : startCharge();
  $("chChem").onchange = () => { const c = CHEMISTRIES[$("chChem").value]; if (c) $("chVmax").value = c.cellVmax.toFixed(2); chargePreview(); $("chNote").textContent = c && !c.ccCvOk ? "⚠ " + c.note : ""; };
  ["chCells","chVmax"].forEach(id => $(id).oninput = chargePreview);
  $("ivRunBtn").onclick = runIV; $("ivClearBtn").onclick = () => { App._ivData = []; drawIV(); $("ivVf").textContent = $("ivKnee").textContent = $("ivRdyn").textContent = "—"; };
  $("rampBtn").onclick = () => App.ramp ? endRamp("stopped by you") : startRamp();
  $("btnGen").onclick = genRamp; $("seqPlay").onclick = playSeq; $("seqStop").onclick = stopSeq; $("seqAdd").onclick = addSeqStep; $("seqClear").onclick = () => { App.seq = { steps: [], running: false, i: 0 }; renderSeq(); };
  $("seqExport").onclick = () => { if (!App.seq || !App.seq.steps.length) return; const csv = "voltage,current,dwell\n" + App.seq.steps.map(s => `${s.v},${s.a},${s.d}`).join("\n"); download(new Blob([csv], { type: "text/csv" }), "sequence.csv"); };
  $("logStartBtn").onclick = startLog; $("logStopBtn").onclick = stopLog; $("logCsv").onclick = () => exportLog("csv"); $("logJson").onclick = () => exportLog("json"); $("logClear").onclick = clearLog;
  $("pollMs").onchange = () => { App.pollMs = Math.max(50, parseInt($("pollMs").value) || 300); };
  $("modalOk").onclick = () => closeModal(true); $("modalCancel").onclick = () => closeModal(false);

  document.addEventListener("keydown", e => {
    if (["INPUT","SELECT","TEXTAREA"].includes(document.activeElement.tagName)) return;
    if (e.key === " ") { e.preventDefault(); if (App.connected) setOutput(!(App.lastM && App.lastM.output)); }
    else if (e.key === "ArrowUp" || e.key === "ArrowDown") {
      e.preventDefault(); if (!App.connected) return;
      const cur = parseFloat($("inV").value) || 0; const d = (e.shiftKey ? 0.01 : 0.1) * (e.key === "ArrowUp" ? 1 : -1);
      $("inV").value = Math.max(0, cur + d).toFixed(2); applySetpoints();
    }
    else if ((e.ctrlKey || e.metaKey) && e.key === "Enter") { e.preventDefault(); applySetpoints(); }
    else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "s") { e.preventDefault(); App.log && App.log.running ? stopLog() : startLog(); }
    else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "p") { e.preventDefault(); App.seq && App.seq.running ? stopSeq() : playSeq(); }
    else if (((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "k") || e.key === "Escape") { e.preventDefault(); if (App.connected) killOutput(); }
  });
  window.addEventListener("resize", () => { drawChart(); drawIV(); });
  window.addEventListener("beforeunload", () => { if (App.io) { try { App.io.close(); } catch {} } });
}
function chargePreview() {
  const chem = $("chChem").value, c = CHEMISTRIES[chem];
  const cells = parseInt($("chCells").value) || 1, vmax = parseFloat($("chVmax").value) || c.cellVmax;
  const target = cells * vmax, vMax = App.psu ? App.psu.limits.vMax : 30;
  $("chTarget").textContent = target.toFixed(2) + " V";
  $("chOVP").textContent = Math.min(vMax, target + cells * c.ovpMargin).toFixed(2) + " V";
}
function endChargeUser() { endCharge("stopped by you", false); guarded(async () => { if (App.psu) await App.psu.setOutput(false); }); }

/* ---- boot ---------------------------------------------------------------- */
buildPanels();
wire();
initTheme();
updateConnUI();
chargePreview();
commLog("Ready. Connect the HM310T, or switch on Simulation to try it with no hardware.", "info");






</script>
</body>
</html>
