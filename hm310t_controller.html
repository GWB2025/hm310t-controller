<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HM310T Controller</title>
<style>
  :root {
    --bg: #0f1115; --panel: #181b21; --panel-hover: #1e2229; --border: #2a2f38;
    --text: #e8e8e8; --text-sec: #9aa0a6; --text-dim: #5f6368;
    --accent: #4ecdc4; --accent-dim: #3a9e97; --accent-glow: rgba(78,205,196,0.12);
    --danger: #ff6b6b; --danger-dim: #c44; --danger-glow: rgba(255,107,107,0.12);
    --positive: #51cf66; --positive-glow: rgba(81,207,102,0.12);
    --warning: #ffd43b; --warning-glow: rgba(255,212,59,0.12);
    --amber: #ffb454; --violet: #a78bfa; --pink: #f783ac; --sky: #74c0fc;
    --input-bg: #111318;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --mono: "SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, monospace;
  }

  /* Light theme. Applied when <html data-theme="light">. The bright accent,
     amber, green and yellow are darkened here so they stay legible on white —
     the dark-theme values wash out. Everything else flows through the same
     custom properties, so no per-rule light styling is needed beyond the few
     places below that hardcode a dark colour. */
  html[data-theme="light"] {
    --bg: #eef1f5; --panel: #ffffff; --panel-hover: #f2f4f8; --border: #d6dbe3;
    --text: #1a1d21; --text-sec: #4a5158; --text-dim: #838a93;
    --accent: #0d9488; --accent-dim: #0b7a70; --accent-glow: rgba(13,148,136,0.12);
    --danger: #dc2626; --danger-dim: #b91c1c; --danger-glow: rgba(220,38,38,0.10);
    --positive: #16a34a; --positive-glow: rgba(22,163,74,0.12);
    --warning: #b7791f; --warning-glow: rgba(183,121,31,0.14);
    --amber: #c2620e; --violet: #7c5cff; --pink: #db2777; --sky: #0284c7;
    --input-bg: #f4f6f9;
  }
  html[data-theme="light"] .comm-log { background: #0f1419; }        /* keep the log terminal-style, legible on light chrome */
  html[data-theme="light"] .comm-log .ts { color: #6b7684; }
  html[data-theme="light"] .lamp .dot { background: #d6dbe3; border-color: #c2c9d2; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; font-size: 13px; }

  header { display: flex; align-items: center; justify-content: space-between; padding: 14px 22px; border-bottom: 1px solid var(--border); background: var(--panel); flex-wrap: wrap; gap: 10px; position: sticky; top: 0; z-index: 50; }
  header h1 { font-size: 17px; font-weight: 600; letter-spacing: 0.3px; }
  header h1 .sub { font-size: 11px; color: var(--text-dim); margin-left: 8px; font-weight: 400; }
  .hdr-group { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .status-pill { display: flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 11px; background: var(--input-bg); border: 1px solid var(--border); white-space: nowrap; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); transition: background 0.3s; flex-shrink: 0; }
  .status-dot.connected { background: var(--positive); box-shadow: 0 0 6px var(--positive); }
  .status-dot.on { background: var(--warning); box-shadow: 0 0 6px var(--warning); }
  .status-dot.running { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 1.2s infinite; }
  .status-dot.charging { background: var(--warning); box-shadow: 0 0 6px var(--warning); animation: pulse 1.2s infinite; }
  .status-dot.sim { background: var(--violet); box-shadow: 0 0 6px var(--violet); }
  .status-dot.alarm { background: var(--danger); box-shadow: 0 0 6px var(--danger); animation: pulse 0.6s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
  @keyframes flashRed { 0%,100%{border-color:var(--border)} 50%{border-color:var(--danger)} }

  button { font-family: var(--font); cursor: pointer; border: none; outline: none; transition: all 0.12s ease; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn { padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 500; background: var(--input-bg); color: var(--text); border: 1px solid var(--border); }
  .btn:hover:not(:disabled) { background: var(--panel-hover); border-color: var(--text-sec); }
  .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); }
  .btn-primary:hover:not(:disabled) { background: var(--accent-dim); border-color: var(--accent-dim); }
  .btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
  .btn-danger:hover:not(:disabled) { background: var(--danger-dim); border-color: var(--danger-dim); }
  .btn-sm { padding: 5px 10px; font-size: 11px; }
  .btn-toggle { background: var(--border); }
  .btn-toggle.active { background: var(--violet); color: #000; border-color: var(--violet); }
  .btn-icon { display: inline-flex; align-items: center; gap: 6px; }
  .kbd-hint { font-size: 9px; color: currentColor; opacity: 0.6; margin-left: 4px; font-family: var(--mono); }

  main { flex: 1; padding: 18px; display: grid; grid-template-columns: repeat(auto-fit, minmax(430px, 1fr)); gap: 16px; align-content: start; max-width: 1500px; margin: 0 auto; width: 100%; }
  .col-span-2 { grid-column: 1 / -1; }

  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 18px; display: flex; flex-direction: column; gap: 14px; }
  .panel.flash { animation: flashRed 0.6s infinite; }
  .panel-title { font-size: 12px; font-weight: 600; color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.6px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .panel-title .aux { font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--text-dim); font-size: 11px; }

  .readout-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .readout-card { background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; text-align: center; position: relative; overflow: hidden; transition: border-color 0.3s; }
  .readout-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent); opacity: 0.4; }
  .readout-card.current::before { background: var(--amber); }
  .readout-card.power::before { background: var(--positive); }
  .readout-card.resistance::before { background: var(--violet); }
  .readout-card.energy::before { background: var(--pink); }
  .readout-card.capacity::before { background: var(--sky); }
  .readout-card.alarm { border-color: var(--danger); box-shadow: 0 0 0 1px var(--danger) inset; }
  .readout-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .readout-value { font-family: var(--mono); font-size: 26px; font-weight: 500; font-variant-numeric: tabular-nums; line-height: 1.1; }
  .readout-value.v { color: var(--accent); }
  .readout-value.a { color: var(--amber); }
  .readout-value.w { color: var(--positive); }
  .readout-unit { font-size: 11px; color: var(--text-sec); margin-left: 3px; }
  .readout-setpoint { font-size: 10px; color: var(--text-dim); margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 4px; }

  .output-section { display: flex; align-items: center; justify-content: space-between; background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; gap: 12px; }
  .output-label { font-size: 14px; font-weight: 600; }
  .output-label .state { font-size: 11px; color: var(--text-dim); margin-left: 8px; font-weight: 400; }
  .toggle { width: 52px; height: 28px; border-radius: 16px; background: var(--border); position: relative; cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
  .toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; border-radius: 50%; background: #fff; transition: transform 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.35); }
  .toggle.on { background: var(--positive); }
  .toggle.on::after { transform: translateX(24px); }
  .toggle.disabled { pointer-events: none; opacity: 0.4; }

  .field-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 90px; }
  .field label { font-size: 11px; color: var(--text-sec); }
  .field .unit-tag { color: var(--text-dim); font-size: 10px; }
  input[type=text], input[type=number], select { font-family: var(--mono); background: var(--input-bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 8px 10px; font-size: 13px; width: 100%; outline: none; transition: border-color 0.15s; }
  input:focus, select:focus { border-color: var(--accent); }
  input:disabled, select:disabled { opacity: 0.5; }
  select { font-family: var(--font); cursor: pointer; }
  input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
  .check-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-sec); cursor: pointer; }

  .preset-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .preset-btn { background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; padding: 9px 6px; display: flex; flex-direction: column; gap: 2px; align-items: center; color: var(--text); }
  .preset-btn:hover { background: var(--panel-hover); border-color: var(--accent); }
  .preset-btn .v { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--accent); }
  .preset-btn .a { font-size: 10px; color: var(--text-dim); }

  .prot-lamps { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
  .lamp { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); }
  .lamp .dot { width: 9px; height: 9px; border-radius: 50%; background: #333; border: 1px solid #444; transition: all 0.2s; }
  .lamp.active .dot { background: var(--danger); border-color: var(--danger); box-shadow: 0 0 6px var(--danger); }
  .lamp.active { color: var(--danger); }
  .prot-raw { font-family: var(--mono); font-size: 12px; color: var(--text-dim); margin-left: auto; }
  .prot-raw.fault { color: var(--amber); }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; padding: 7px 8px; color: var(--text-sec); font-weight: 500; font-size: 11px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--panel); }
  td { padding: 5px 8px; border-bottom: 1px solid rgba(42,47,56,0.5); font-family: var(--mono); }
  tr.active-step td { background: var(--accent-glow); }
  .table-wrap { max-height: 240px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; }
  td input { padding: 4px 6px; font-size: 11px; }
  .row-del { color: var(--danger); cursor: pointer; font-size: 14px; background: none; border: none; }

  .stat-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .stat { background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
  .stat .cap { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; }
  .stat .val { font-family: var(--mono); font-size: 17px; margin-top: 3px; color: var(--accent); font-variant-numeric: tabular-nums; }

  .phase-badges { display: flex; gap: 8px; }
  .phase-badge { padding: 4px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; background: var(--input-bg); border: 1px solid var(--border); color: var(--text-dim); }
  .phase-badge.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }
  .phase-badge.done { background: var(--positive-glow); border-color: var(--positive); color: var(--positive); }

  canvas { width: 100%; display: block; border-radius: 8px; background: var(--input-bg); border: 1px solid var(--border); }
  .chart-legend { display: flex; gap: 16px; font-size: 11px; color: var(--text-sec); }
  .chart-legend span { display: flex; align-items: center; gap: 5px; }
  .chart-legend .swatch { width: 12px; height: 3px; border-radius: 2px; }

  .comm-log { font-family: var(--mono); font-size: 11px; background: #0a0c0f; border: 1px solid var(--border); border-radius: 8px; padding: 10px; height: 150px; overflow-y: auto; line-height: 1.6; }
  .comm-log .ok { color: var(--positive); }
  .comm-log .err { color: var(--danger); }
  .comm-log .warn { color: var(--amber); }
  .comm-log .info { color: var(--text-sec); }
  .comm-log .ts { color: var(--text-dim); }

  .notice { font-size: 11px; color: var(--text-dim); line-height: 1.5; }
  .notice.warn { color: var(--amber); }
  .banner { padding: 10px 14px; border-radius: 8px; font-size: 12px; display: none; }
  .banner.show { display: block; }
  .banner.danger { background: var(--danger-glow); border: 1px solid var(--danger); color: var(--danger); }
  .banner.warn { background: var(--warning-glow); border: 1px solid var(--warning); color: var(--warning); }

  .divider { height: 1px; background: var(--border); margin: 2px 0; }
  .muted { color: var(--text-dim); }
  .mono { font-family: var(--mono); }
  a { color: var(--accent); }

  /* modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal-backdrop.show { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 22px; max-width: 460px; width: 100%; }
  .modal h3 { font-size: 15px; margin-bottom: 12px; }
  .modal .body { font-size: 12px; color: var(--text-sec); line-height: 1.6; margin-bottom: 18px; white-space: pre-wrap; }
  .modal .actions { display: flex; gap: 10px; justify-content: flex-end; }

  @media (max-width: 520px) {
    main { grid-template-columns: 1fr; padding: 12px; }
    .readout-grid { grid-template-columns: repeat(2, 1fr); }
    .preset-grid { grid-template-columns: repeat(2, 1fr); }
    .stat-strip { grid-template-columns: repeat(2, 1fr); }
  }
</style>
<script>
  /* Apply a saved light preference before the body paints, so there is no
     flash of the dark default. Dark remains the default when nothing is saved. */
  try { if (localStorage.getItem("hm310t-theme") === "light") document.documentElement.setAttribute("data-theme", "light"); } catch (e) {}
</script>
</head>
<body>
<header>
  <h1>HM310T Controller <span class="sub">bench supply · Web Serial</span></h1>
  <div class="hdr-group">
    <div class="status-pill"><span class="status-dot" id="connDot"></span><span id="connText">Disconnected</span></div>
    <div class="status-pill"><span class="status-dot" id="outDot"></span><span id="outText">Output OFF</span></div>
    <div class="status-pill" id="alarmPill" style="display:none;"><span class="status-dot alarm"></span><span>ALARM</span></div>
    <button class="btn" id="btnTheme" title="Toggle light / dark view">☀ Light</button>
    <button class="btn btn-toggle" id="btnSim">Simulation: OFF</button>
    <button class="btn btn-primary" id="btnConnect">Connect USB</button>
    <button class="btn" id="btnDisconnect" disabled>Disconnect</button>
    <button class="btn btn-danger" id="btnKill" disabled title="Emergency: output off (Ctrl+K / Esc)">Kill</button>
  </div>
</header>

<main id="main"><!-- panels injected by script --></main>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <div class="body" id="modalBody"></div>
    <div class="actions">
      <button class="btn" id="modalCancel">Cancel</button>
      <button class="btn btn-primary" id="modalOk">Proceed</button>
    </div>
  </div>
</div>

<script>
"use strict";
/* ============================================================================
   HM310T browser controller — a rewrite grounded in a register map measured
   on real hardware, not the reverse-engineered map that circulates online.

   The differences that matter, all confirmed against a physical HM310T:
     - setpoints at 0x0030/0x0031, output at 0x0001, protection at 0x0002;
     - the instrument reads at most 4 registers per Modbus transaction;
     - protection register 0x0002 RESTS at 0x0002 (that bit is "healthy", not a
       fault) and an over-voltage trip sets bit 0x04 (the online map calls that
       bit OPP — it is wrong);
     - a trip LATCHES: only a power cycle clears it, nothing on the bus does;
     - the instrument's true ratings (V/I/P max) live in 0x0014..0x0017 and are
       read from the instrument rather than assumed.

   The safety posture throughout: the supply's CV ceiling is enforced in
   hardware, so software cannot drive the output above a set voltage. Charging
   leans on that, plus a preflight measurement of the pack and a timeout.
   ========================================================================= */

/* ---------------------------------------------------------------------------
   Modbus RTU: CRC-16, framing, and function codes 0x03 / 0x06 / 0x10.
   The HM310T supports only those three; there is no coil or input space.
   --------------------------------------------------------------------------- */
const CRC_TABLE = new Uint16Array(256);
for (let i = 0; i < 256; i++) {
  let c = i;
  for (let j = 0; j < 8; j++) c = (c & 1) ? (0xA001 ^ (c >>> 1)) : (c >>> 1);
  CRC_TABLE[i] = c;
}
function crc16(bytes) {
  let crc = 0xFFFF;
  for (const b of bytes) crc = CRC_TABLE[(crc ^ b) & 0xFF] ^ (crc >>> 8);
  return [crc & 0xFF, (crc >>> 8) & 0xFF];   // little-endian on the wire
}
function withCrc(bytes) {
  const out = new Uint8Array(bytes.length + 2);
  out.set(bytes); out.set(crc16(bytes), bytes.length);
  return out;
}
function frameRead(addr, count) {
  return withCrc([1, 0x03, (addr >> 8) & 0xFF, addr & 0xFF, (count >> 8) & 0xFF, count & 0xFF]);
}
function frameWrite(addr, value) {
  value &= 0xFFFF;
  return withCrc([1, 0x06, (addr >> 8) & 0xFF, addr & 0xFF, (value >> 8) & 0xFF, value & 0xFF]);
}

class ModbusError extends Error {}
class ModbusTimeout extends ModbusError {}
class ModbusExceptionResponse extends ModbusError {
  constructor(code) {
    const text = {1: "illegal function", 2: "illegal data address",
      3: "illegal data value", 4: "slave device failure", 6: "device busy"}[code] || "unknown";
    super(`Modbus exception ${code} (${text})`);
    this.code = code;
  }
}
/** The serial link itself failed — port unplugged, asleep, or re-enumerated. */
class PortLostError extends ModbusError {}

/* ---------------------------------------------------------------------------
   The register map, and the protection semantics, as measured on hardware.
   --------------------------------------------------------------------------- */
const REG = {
  OUTPUT:    0x0001,   // 0 = off, 1 = on
  PROTECT:   0x0002,   // NOT the online bitfield — see PROT below
  MODEL:     0x0003,   // e.g. 3210 = 32 V / 10 A
  CLASS:     0x0004,
  DECIMALS:  0x0005,   // 0x0233 = 2 dp V, 3 dp A, 3 dp W
  V_MEAS:    0x0010,
  I_MEAS:    0x0011,
  P_MEAS_HI: 0x0012,   // 0x0012/0x0013 = one 32-bit value
  P_MEAS_LO: 0x0013,
  RATING_V:  0x0014,   // maximum ratings, read from the instrument
  RATING_I:  0x0015,
  RATING_PH: 0x0016,
  RATING_PL: 0x0017,
  OVP:       0x0020,
  OCP:       0x0021,
  OPP_HI:    0x0022,   // 0x0022/0x0023 = one 32-bit value
  OPP_LO:    0x0023,
  V_SET:     0x0030,
  I_SET:     0x0031,
  SLAVE:     0x9999,   // present; do not write to it
};

// Protection register 0x0002, measured:
//   0x02 is set at all times on a healthy instrument — it is NOT a fault.
//   0x04 is what an over-voltage trip sets.
//   The remaining bits have never been provoked, so they are shown raw.
const PROT_IDLE = 0x02;
const PROT_OVP  = 0x04;
const PROT_BITS = [[0x01, "b0"], [PROT_IDLE, "idle"], [PROT_OVP, "OVP"], [0x08, "b3"], [0x10, "b4"]];
function faults(word) { return word & ~PROT_IDLE; }
function protText(word) {
  const bad = faults(word);
  if (!bad) return "none";
  return PROT_BITS.filter(([b, n]) => b !== PROT_IDLE && (bad & b)).map(([b, n]) => n).join(" + ");
}
function decodeDecimals(v) {
  const dp = [(v >> 8) & 0xF, (v >> 4) & 0xF, v & 0xF];
  if ((v >> 12) === 0 && dp.every(d => d >= 0 && d <= 4)) return dp;
  return null;
}

/* ---------------------------------------------------------------------------
   The transport: talks to either a Web Serial port or the simulator, both of
   which expose the same byte-level write/read. All serial-layer failures are
   translated to PortLostError so the app can drop the connection cleanly.
   --------------------------------------------------------------------------- */
class Transport {
  constructor(io) {
    this.io = io;               // { write(Uint8Array), read()->Promise<Uint8Array|null>, close() }
    this.buffer = new Uint8Array(0);
    this.timeoutMs = 600;
    this.interFrameMs = 8;
    this.lastTx = 0;
    this.busy = Promise.resolve();
    this.txCount = 0;
  }

  _append(chunk) {
    const merged = new Uint8Array(this.buffer.length + chunk.length);
    merged.set(this.buffer); merged.set(chunk, this.buffer.length);
    this.buffer = merged;
  }

  // Serialise transactions: the bus has one owner at a time.
  async _exchange(frame, expectedFn) {
    const gap = this.interFrameMs - (performance.now() - this.lastTx);
    if (gap > 0) await sleep(gap);

    this.buffer = new Uint8Array(0);
    try {
      await this.io.write(frame);
    } catch (e) {
      throw new PortLostError(`serial write failed (${e.message || e})`);
    }
    this.txCount++;

    const deadline = performance.now() + this.timeoutMs;
    const slave = frame[0];
    while (true) {
      // enough bytes to parse a reply?
      if (this.buffer.length >= 5) {
        const fn = this.buffer[1];
        if (fn & 0x80) {                       // exception frame: addr fn code crc crc
          if (this.buffer.length >= 5) {
            this._checkCrc(this.buffer.slice(0, 5));
            const code = this.buffer[2];
            this.lastTx = performance.now();
            throw new ModbusExceptionResponse(code);
          }
        } else if (fn === 0x03) {              // addr fn bytecount ...data crc crc
          const byteCount = this.buffer[2];
          const total = 3 + byteCount + 2;
          if (this.buffer.length >= total) {
            const f = this.buffer.slice(0, total);
            this._checkCrc(f);
            this.lastTx = performance.now();
            if (f[0] !== slave) throw new ModbusError(`reply from address ${f[0]}`);
            const regs = [];
            for (let i = 0; i < byteCount / 2; i++) regs.push((f[3 + i * 2] << 8) | f[4 + i * 2]);
            return regs;
          }
        } else {                               // 0x06 / 0x10 echo: addr fn a a v v crc crc
          const total = 8;
          if (this.buffer.length >= total) {
            const f = this.buffer.slice(0, total);
            this._checkCrc(f);
            this.lastTx = performance.now();
            if (f[0] !== slave) throw new ModbusError(`reply from address ${f[0]}`);
            return f;
          }
        }
      }
      if (performance.now() > deadline) {
        this.lastTx = performance.now();
        throw new ModbusTimeout(`timed out (${this.buffer.length} bytes)`);
      }
      let chunk;
      try {
        chunk = await this.io.read(deadline - performance.now());
      } catch (e) {
        throw new PortLostError(`serial read failed (${e.message || e})`);
      }
      if (chunk && chunk.length) this._append(chunk);
    }
  }

  _checkCrc(frame) {
    const body = frame.slice(0, frame.length - 2);
    const [lo, hi] = crc16(body);
    if (frame[frame.length - 2] !== lo || frame[frame.length - 1] !== hi)
      throw new ModbusError("bad CRC");
  }

  // Public API, serialised through this.busy so calls never interleave.
  _enqueue(fn) {
    const run = this.busy.then(fn, fn);
    this.busy = run.catch(() => {});
    return run;
  }

  readRegisters(addr, count) {
    return this._enqueue(async () => {
      // A vanished port or an exception is not retried; a transient timeout is.
      let lastErr = null;
      for (let attempt = 0; attempt < 3; attempt++) {
        try { return await this._exchange(frameRead(addr, count), 0x03); }
        catch (e) {
          if (e instanceof PortLostError || e instanceof ModbusExceptionResponse) throw e;
          lastErr = e; await sleep(40 * (attempt + 1));
        }
      }
      throw lastErr;
    });
  }

  writeRegister(addr, value) {
    return this._enqueue(async () => {
      let lastErr = null;
      for (let attempt = 0; attempt < 3; attempt++) {
        try {
          const echo = await this._exchange(frameWrite(addr, value), 0x06);
          const ea = (echo[2] << 8) | echo[3], ev = (echo[4] << 8) | echo[5];
          if (ea !== addr) throw new ModbusError(`write echo address ${ea}`);
          return echo;
        } catch (e) {
          if (e instanceof PortLostError || e instanceof ModbusExceptionResponse) throw e;
          lastErr = e; await sleep(40 * (attempt + 1));
        }
      }
      throw lastErr;
    });
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, Math.max(0, ms))); }

/* ---------------------------------------------------------------------------
   The instrument. Wraps the transport with scaling, limits read from the
   instrument's own rating registers, and block reads sized to the measured cap.
   --------------------------------------------------------------------------- */
class HM310T {
  constructor(transport) {
    this.bus = transport;
    this.vScale = 100; this.iScale = 1000; this.pScale = 1000;
    this.dp = [2, 3, 3];
    this.maxBlock = 4;
    this.limits = { vMax: 30, iMax: 10, ovpMax: 30, ocpMax: 10, oppMax: 300 };
    this.modelCode = null;
    this.limitsSource = "default";
    this.settings = null;
    this.notes = [];
  }

  async _readOne(addr) {
    try { return (await this.bus.readRegisters(addr, 1))[0]; }
    catch (e) { if (e instanceof ModbusExceptionResponse) return null; throw e; }
  }

  async _probeMaxBlock() {
    for (let n = 8; n >= 1; n--) {
      try { await this.bus.readRegisters(REG.V_MEAS, n); return n; }
      catch (e) { if (!(e instanceof ModbusExceptionResponse)) throw e; }
    }
    return 1;
  }

  async _readBlock(addr, count) {
    const out = [];
    while (out.length < count) {
      const take = Math.min(this.maxBlock, count - out.length);
      const regs = await this.bus.readRegisters(addr + out.length, take);
      out.push(...regs);
    }
    return out;
  }

  async _readScattered(addrs) {
    // group contiguous runs, each no longer than the block cap
    const wanted = [...new Set(addrs)].sort((a, b) => a - b);
    const out = {};
    let run = [];
    const flush = async () => {
      if (!run.length) return;
      const regs = await this.bus.readRegisters(run[0], run.length);
      run.forEach((a, i) => { out[a] = regs[i]; });
      run = [];
    };
    for (const a of wanted) {
      if (run.length && a === run[run.length - 1] + 1 && run.length < this.maxBlock) run.push(a);
      else { await flush(); run = [a]; }
    }
    await flush();
    return out;
  }

  async _readRatings() {
    const raw = [];
    for (const a of [REG.RATING_V, REG.RATING_I, REG.RATING_PH, REG.RATING_PL]) raw.push(await this._readOne(a));
    if (raw.some(v => v === null)) return null;
    const vMax = raw[0] / this.vScale, iMax = raw[1] / this.iScale;
    const pMax = ((raw[2] << 16) | raw[3]) / this.pScale;
    if (!(vMax >= 1 && vMax <= 200 && iMax >= 0.1 && iMax <= 100 && pMax > 0)) return null;
    if (Math.abs(pMax - vMax * iMax) > Math.max(1, 0.02 * pMax)) return null;
    return { vMax, iMax, pMax };
  }

  async identify() {
    this.notes = [];
    this.maxBlock = await this._probeMaxBlock();
    if (this.maxBlock < 4)
      this.notes.push(`This instrument reads only ${this.maxBlock} register(s) per transaction; reads are split to suit.`);

    const block = {};
    for (let a = 0x0000; a <= 0x0005; a++) block[a] = await this._readOne(a);

    this.modelCode = block[REG.MODEL];
    // scaling from the instrument
    const dp = block[REG.DECIMALS] != null ? decodeDecimals(block[REG.DECIMALS]) : null;
    if (dp) { this.dp = dp; }
    else this.notes.push("Decimal-places register unreadable; assuming 2 dp V / 3 dp A / 3 dp W.");
    this.vScale = Math.pow(10, this.dp[0]);
    this.iScale = Math.pow(10, this.dp[1]);
    this.pScale = Math.pow(10, this.dp[2]);

    // limits: prefer the instrument's own rating registers
    const ratings = await this._readRatings();
    if (ratings) {
      this.limits = { vMax: ratings.vMax, iMax: ratings.iMax, ovpMax: ratings.vMax, ocpMax: ratings.iMax, oppMax: ratings.pMax };
      this.limitsSource = "the instrument's rating registers";
    } else if (this.modelCode && this.modelCode >= 1000 && this.modelCode <= 9999) {
      const v = Math.floor(this.modelCode / 100), a = this.modelCode % 100;
      this.limits = { vMax: v, iMax: a, ovpMax: v, ocpMax: a, oppMax: v * a };
      this.limitsSource = "the model code";
      this.notes.push("Rating registers unreadable; limits inferred from the model code.");
    } else {
      this.notes.push("Neither ratings nor a model code could be read; using 30 V / 10 A defaults.");
    }
    return { block, model: this.modelCode, limits: this.limits, dp: this.dp, maxBlock: this.maxBlock, notes: this.notes, limitsSource: this.limitsSource };
  }

  async readMeasurement() {
    const [vR, iR, pHi, pLo] = await this._readBlock(REG.V_MEAS, 4);
    const [outR, protR] = await this._readBlock(REG.OUTPUT, 2);
    const voltage = vR / this.vScale, current = iR / this.iScale;
    const power = ((pHi << 16) | pLo) / this.pScale;
    const output = !!outR;
    let mode = "off";
    if (output && this.settings) {
      const { vSet, iSet } = this.settings;
      mode = (iSet > 0 && current >= iSet * 0.97 && voltage < vSet - 0.05) ? "CC" : "CV";
    } else if (output) mode = "on";
    return { t: performance.now(), wall: Date.now(), voltage, current, power, output, protection: protR, mode };
  }

  async readSettings() {
    const r = await this._readScattered([REG.V_SET, REG.I_SET, REG.OVP, REG.OCP, REG.OPP_HI, REG.OPP_LO]);
    this.settings = {
      vSet: r[REG.V_SET] / this.vScale,
      iSet: r[REG.I_SET] / this.iScale,
      ovp: r[REG.OVP] / this.vScale,
      ocp: r[REG.OCP] / this.iScale,
      opp: ((r[REG.OPP_HI] << 16) | r[REG.OPP_LO]) / this.pScale,
    };
    return this.settings;
  }

  _clamp(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }

  async setVoltage(v) { v = this._clamp(v, 0, this.limits.vMax); await this.bus.writeRegister(REG.V_SET, Math.round(v * this.vScale)); return v; }
  async setVoltageRaw(raw) { raw = Math.max(0, Math.min(Math.round(this.limits.vMax * this.vScale), Math.round(raw))); await this.bus.writeRegister(REG.V_SET, raw); return raw / this.vScale; }
  async setCurrent(a) { a = this._clamp(a, 0, this.limits.iMax); await this.bus.writeRegister(REG.I_SET, Math.round(a * this.iScale)); return a; }
  async setOVP(v) { v = this._clamp(v, 0, this.limits.ovpMax); await this.bus.writeRegister(REG.OVP, Math.round(v * this.vScale)); return v; }
  async setOCP(a) { a = this._clamp(a, 0, this.limits.ocpMax); await this.bus.writeRegister(REG.OCP, Math.round(a * this.iScale)); return a; }
  async setOPP(w) { w = this._clamp(w, 0, this.limits.oppMax); const raw = Math.round(w * this.pScale); await this.bus.writeRegister(REG.OPP_HI, (raw >>> 16) & 0xFFFF); await this.bus.writeRegister(REG.OPP_LO, raw & 0xFFFF); return w; }
  async setOutput(on) {
    await this.bus.writeRegister(REG.OUTPUT, on ? 1 : 0);
    const [outR, protR] = await this._readBlock(REG.OUTPUT, 2);
    return { output: !!outR, protection: protR };
  }

  /** Reasons not to enable the output at all — a latched trip needs a power cycle. */
  async blockingFaults() {
    const [, protR] = await this._readBlock(REG.OUTPUT, 2);
    const out = [];
    if (faults(protR))
      out.push(`A ${protText(protR)} trip is latched (0x0002 = 0x${protR.toString(16).padStart(4,"0")}). Nothing on the serial link clears it — power-cycle the supply.`);
    return out;
  }
}

/* ---------------------------------------------------------------------------
   Chemistry presets and charge validation, matching the Python driver.
   --------------------------------------------------------------------------- */
const CHEMISTRIES = {
  "Li-ion (4.20V)":    { label: "Li-ion",    cellVmax: 4.20, cellVfloor: 2.50, ovpMargin: 0.15, ccCvOk: true,  note: "" },
  "LiFePO4 (3.60V)":   { label: "LiFePO4",   cellVmax: 3.60, cellVfloor: 2.00, ovpMargin: 0.15, ccCvOk: true,  note: "" },
  "NiMH (1.45V)":      { label: "NiMH",      cellVmax: 1.45, cellVfloor: 0.80, ovpMargin: 0.10, ccCvOk: false, note: "CC/CV is not how NiMH is properly charged (−ΔV or temperature is). Treat this as a current-limited top-up and rely on the timeout." },
  "NiCd (1.45V)":      { label: "NiCd",      cellVmax: 1.45, cellVfloor: 0.80, ovpMargin: 0.10, ccCvOk: false, note: "CC/CV is not how NiCd is properly charged (−ΔV or temperature is). Treat this as a current-limited top-up and rely on the timeout." },
  "Lead Acid (2.40V)": { label: "Lead Acid", cellVmax: 2.40, cellVfloor: 1.50, ovpMargin: 0.20, ccCvOk: true,  note: "" },
  "Custom":            { label: "Custom",    cellVmax: 4.20, cellVfloor: 2.50, ovpMargin: 0.15, ccCvOk: true,  note: "Custom chemistry — check the target voltage and termination carefully; nothing is assumed for you." },
};

function chargeTarget(p) { return p.cells * p.cellVmax; }
function chargeOVP(p, vMax) { return Math.min(vMax, chargeTarget(p) + p.cells * CHEMISTRIES[p.chem].ovpMargin); }
function chargeVfloor(p) { return p.cells * CHEMISTRIES[p.chem].cellVfloor; }

function chargeProblems(p, limits, vScale, iScale) {
  const out = [];
  const target = chargeTarget(p);
  if (p.cells < 1) out.push("The cell count must be at least 1.");
  if (target > limits.vMax + 1e-9) out.push(`${p.cells} cell(s) at ${p.cellVmax.toFixed(2)} V is ${target.toFixed(2)} V, above this instrument's ${fmt(limits.vMax)} V maximum.`);
  if (chargeOVP(p, limits.vMax) <= target + 1e-9) out.push(`There is no room to arm OVP above the ${target.toFixed(2)} V target within the instrument's range — this charge is too close to the supply's ceiling to protect.`);
  if (p.chargeCurrent <= 0) out.push("The charge current must be positive.");
  if (p.chargeCurrent > limits.iMax + 1e-9) out.push(`The charge current ${p.chargeCurrent.toFixed(3)} A is above the instrument's ${fmt(limits.iMax)} A maximum.`);
  if (p.termCurrent <= 0) out.push("The termination current must be positive.");
  if (p.termCurrent * iScale < 1) out.push(`A termination current of ${fmt(p.termCurrent)} A is below the instrument's resolution; it could never be detected and the charge would always run to timeout.`);
  if (p.termCurrent >= p.chargeCurrent) out.push("The termination current must be well below the charge current — it is the tail of the taper, typically the charge current over 10 to 20.");
  if (p.timeoutMin <= 0) out.push("The timeout must be positive; it is the last line of defence if the taper never completes.");
  return out;
}

function batteryPreflight(p, measuredV) {
  const target = chargeTarget(p);
  if (measuredV > target + 0.05) return `The pack reads ${measuredV.toFixed(2)} V, above the ${target.toFixed(2)} V target. The cell count is probably wrong, or this pack does not belong on this charge. Stopped before charging.`;
  if (measuredV >= target - 0.05) return `The pack is already at ${measuredV.toFixed(2)} V, at or above the ${target.toFixed(2)} V target — it appears full already. Nothing to do.`;
  if (measuredV < chargeVfloor(p)) return `The pack reads only ${measuredV.toFixed(2)} V, below the ${chargeVfloor(p).toFixed(2)} V floor for ${p.cells} ${CHEMISTRIES[p.chem].label} cell(s). That can mean a reversed connection, a dead cell, or nothing attached. Stopped before charging — check the connection.`;
  return null;
}

/* Ramp step arithmetic, in raw register units so it cannot drift. */
function rampRawSteps(startV, stopV, stepV, vScale) {
  const a = Math.round(startV * vScale), b = Math.round(stopV * vScale);
  const d = Math.max(1, Math.round(Math.abs(stepV) * vScale));
  if (a === b) return [a];
  const sign = b > a ? 1 : -1, out = [];
  let v = a;
  while (sign > 0 ? v < b : v > b) { out.push(v); v += sign * d; }
  out.push(b);
  return out;
}
function rampProblems(startV, stopV, stepV, dwell, limits, settings, vScale) {
  const out = [], lo = Math.min(startV, stopV), hi = Math.max(startV, stopV);
  if (Math.abs(stepV) * vScale < 0.5) out.push(`A step of ${fmt(stepV)} V is below the instrument's resolution (${fmt(1/vScale)} V).`);
  if (dwell < 0.05) out.push("A dwell shorter than 0.05 s is faster than a bus transaction.");
  if (lo < 0) out.push(`${lo.toFixed(2)} V is below zero.`);
  if (hi > limits.vMax + 1e-9) out.push(`${hi.toFixed(2)} V is above the instrument's ${fmt(limits.vMax)} V maximum.`);
  if (settings && hi >= settings.ovp - 1e-9) out.push(`The ramp reaches ${hi.toFixed(2)} V, not below OVP (${settings.ovp.toFixed(2)} V). It would trip mid-ramp, and the trip latches — raise OVP above ${hi.toFixed(2)} V first.`);
  return out;
}

function fmt(x) { return (Math.round(x * 1000) / 1000).toString(); }

/* ---------------------------------------------------------------------------
   A byte-level simulated instrument, reproducing the measured behaviour: the
   4-register read cap, exception 0x03 for over-long reads / 0x02 for absent
   addresses, the idle protection bit, a latching OVP trip, and rating registers.
   Optionally drives a battery model so a full charge can be exercised.
   --------------------------------------------------------------------------- */
class SimBattery {
  constructor({ cells = 1, soc = 0.4, capacityMah = 2000, esr = 0.15, emfEmpty = 3.3, emfFull = 4.2, timeScale = 1 } = {}) {
    this.cells = cells; this.soc = Math.max(0, Math.min(1, soc));
    this.capacityMah = capacityMah; this.esr = esr * cells;
    this.emfEmpty = emfEmpty * cells; this.emfFull = emfFull * cells;
    this.timeScale = timeScale; this.last = performance.now();
  }
  get emf() { return this.emfEmpty + (this.emfFull - this.emfEmpty) * this.soc; }
  respond(vApplied, iLimit) {
    const now = performance.now(); const dt = (now - this.last) / 1000 * this.timeScale; this.last = now;
    const drive = this.esr > 0 ? (vApplied - this.emf) / this.esr : iLimit;
    const i = Math.max(0, Math.min(iLimit, drive));
    const vT = this.emf + i * this.esr;
    if (dt > 0 && this.capacityMah > 0) this.soc = Math.min(1, this.soc + (i * dt / 3600 * 1000) / this.capacityMah);
    return [vT, i];
  }
}

class SimulatedInstrument {
  constructor({ model = 3210, ratings = null, loadOhms = 10, battery = null, noise = true } = {}) {
    this.loadOhms = loadOhms; this.battery = battery; this.noise = noise;
    this.maxBlock = 4; this.t0 = performance.now();
    const V = 100, I = 1000, P = 1000;
    this.regs = {
      0x0000: 0, [REG.OUTPUT]: 0, [REG.PROTECT]: PROT_IDLE, [REG.MODEL]: model,
      [REG.CLASS]: 0x4B43, [REG.DECIMALS]: 0x0233,
      [REG.V_MEAS]: 0, [REG.I_MEAS]: 0, [REG.P_MEAS_HI]: 0, [REG.P_MEAS_LO]: 0,
      [REG.OVP]: Math.round(33 * V), [REG.OCP]: Math.round(10.5 * I),
      [REG.OPP_HI]: 0, [REG.OPP_LO]: Math.round(305 * P) & 0xFFFF,
      [REG.V_SET]: 0, [REG.I_SET]: Math.round(1 * I), [REG.SLAVE]: 1,
    };
    const [vMax, iMax] = ratings || [Math.floor(model / 100), model % 100];
    const pMax = ratings ? ratings[2] : vMax * iMax;
    this.regs[REG.RATING_V] = Math.round(vMax * V);
    this.regs[REG.RATING_I] = Math.round(iMax * I);
    const praw = Math.round(pMax * P);
    this.regs[REG.RATING_PH] = (praw >>> 16) & 0xFFFF;
    this.regs[REG.RATING_PL] = praw & 0xFFFF;
    this._outBuf = [];
  }

  powerCycle() { this.regs[REG.PROTECT] = PROT_IDLE; this.regs[REG.V_MEAS] = 0; this.regs[REG.I_MEAS] = 0; }

  _update() {
    const r = this.regs;
    const vSet = r[REG.V_SET] / 100, iSet = r[REG.I_SET] / 1000;
    const ovp = r[REG.OVP] / 100;
    if (!r[REG.OUTPUT]) {
      if (!faults(r[REG.PROTECT])) { r[REG.V_MEAS] = 0; r[REG.I_MEAS] = 0; r[REG.P_MEAS_HI] = 0; r[REG.P_MEAS_LO] = 0; }
      return;
    }
    let vOut, iOut;
    if (this.battery) { [vOut, iOut] = this.battery.respond(vSet, iSet); }
    else {
      let rr = this.loadOhms;
      if (this.noise) rr *= 1 + 0.05 * Math.sin((performance.now() - this.t0) / 9000);
      vOut = vSet; iOut = rr > 0 ? vOut / rr : iSet;
      if (iOut > iSet) { iOut = iSet; vOut = iOut * rr; }
    }
    if (vOut > ovp) {                    // latching over-voltage trip
      r[REG.OUTPUT] = 0; r[REG.PROTECT] = PROT_IDLE | PROT_OVP;
      r[REG.V_MEAS] = Math.round(vOut * 100); r[REG.I_MEAS] = 0;
      r[REG.P_MEAS_HI] = 0; r[REG.P_MEAS_LO] = 0; return;
    }
    if (this.noise) { vOut += (Math.random() - 0.5) * 0.004; iOut += (Math.random() - 0.5) * 0.002; }
    vOut = Math.max(0, vOut); iOut = Math.max(0, iOut);
    const praw = Math.max(0, Math.min(0xFFFFFFFF, Math.round(vOut * iOut * 1000)));
    r[REG.V_MEAS] = Math.round(vOut * 100); r[REG.I_MEAS] = Math.round(iOut * 1000);
    r[REG.P_MEAS_HI] = (praw >>> 16) & 0xFFFF; r[REG.P_MEAS_LO] = praw & 0xFFFF;
  }

  _exists(a) { return a in this.regs; }

  _handle(frame) {
    const fn = frame[1], addr = (frame[2] << 8) | frame[3];
    const exc = (code) => { const f = [1, fn | 0x80, code]; return withCrc(f); };
    try {
      if (fn === 0x03) {
        const count = (frame[4] << 8) | frame[5];
        if (count < 1 || count > this.maxBlock) return exc(3);           // too many
        const data = [];
        for (let i = 0; i < count; i++) { const a = addr + i; if (!this._exists(a)) throw { bad: true }; data.push(this.regs[a]); }
        const bytes = count * 2, body = [1, 0x03, bytes];
        for (const d of data) { body.push((d >>> 8) & 0xFF, d & 0xFF); }
        return withCrc(body);
      } else if (fn === 0x06) {
        const val = (frame[4] << 8) | frame[5];
        if (!this._exists(addr)) return exc(2);
        this.regs[addr] = val & 0xFFFF;
        this._update();
        return withCrc([1, 0x06, frame[2], frame[3], frame[4], frame[5]]);
      }
      return exc(1);
    } catch (e) { return exc(2); }                                        // absent address
  }

  // IO adapter surface
  async write(frameBytes) {
    this._update();
    const resp = this._handle(frameBytes);
    // deliver after a short, realistic delay
    await sleep(6 + Math.random() * 10);
    this._outBuf.push(resp);
  }
  async read() {
    if (this._outBuf.length) return this._outBuf.shift();
    await sleep(4);
    return null;
  }
  close() {}
}

/* Web Serial adapter. */
class SerialIO {
  constructor(port) { this.port = port; this.reader = null; this.writer = null; }
  async open(baud) {
    await this.port.open({ baudRate: baud, dataBits: 8, stopBits: 1, parity: "none", bufferSize: 4096 });
    this.writer = this.port.writable.getWriter();
    this.reader = this.port.readable.getReader();
  }
  async write(bytes) { await this.writer.write(bytes); }
  async read() {
    const { value, done } = await this.reader.read();
    if (done) return null;
    return value;
  }
  async close() {
    try { if (this.reader) { await this.reader.cancel(); this.reader.releaseLock(); } } catch {}
    try { if (this.writer) { this.writer.releaseLock(); } } catch {}
    try { await this.port.close(); } catch {}
  }
}

  const b = $("btnTheme");
  if (b) b.textContent = light ? "☾ Dark" : "☀ Light";   // shows the view it switches to
  if (persist) { try { localStorage.setItem(THEME_KEY, light ? "light" : "dark"); } catch (e) {} }
  try { drawChart(); drawIV(); } catch (e) {}             // charts read theme colours, so repaint
}
function toggleTheme() {
  const light = document.documentElement.getAttribute("data-theme") === "light";
  applyTheme(light ? "dark" : "light", true);
}
function initTheme() {
  // the head script may have already set data-theme="light" from a saved
  // preference; honour whatever is there, defaulting to dark.
  const light = document.documentElement.getAttribute("data-theme") === "light";
  applyTheme(light ? "light" : "dark", false);
}

function commLog(msg, cls = "") {
  const el = $("commLog"); if (!el) return;
  const line = document.createElement("div");
  line.innerHTML = `<span class="ts">${tsStr()}</span> <span class="${cls}">${msg}</span>`;
  el.appendChild(line);
  while (el.children.length > 300) el.removeChild(el.firstChild);
  el.scrollTop = el.scrollHeight;
}

/* ---- connection ---------------------------------------------------------- */
async function connect(useSim) {
  if (App.connected) return;
  try {
    let io;
    if (useSim) {
      const load = parseFloat($("simLoad").value) || 10;
      const batt = $("simBattery").checked
        ? new SimBattery({ cells: parseInt($("chCells").value) || 1, soc: 0.4,
            capacityMah: parseFloat($("simCapacity").value) || 2000, esr: 0.2, timeScale: parseFloat($("simSpeed").value) || 1 })
        : null;
      io = new SimulatedInstrument({ model: 3210, ratings: [32.0, 10.2, 326.4], loadOhms: load, battery: batt });
      App.sim = true;
    } else {
      if (!("serial" in navigator)) { showBanner("This browser has no Web Serial API. Use Chrome or Edge, or switch on Simulation.", "danger"); return; }
      const port = await navigator.serial.requestPort();
      io = new SerialIO(port);
      const baud = parseInt($("baud").value) || 9600;
      await io.open(baud);
      App.sim = false;
    }
    App.io = io;
    App.psu = new HM310T(new Transport(io));
    const info = await App.psu.identify();
    await App.psu.readSettings();

    App.connected = true;
    commLog(`Connected${App.sim ? " (simulated)" : ""}. Model ${info.model}, ${fmt(info.limits.vMax)} V / ${fmt(info.limits.iMax)} A.`, "ok");
    const blk = Object.keys(info.block).sort((a,b)=>a-b).map(k => info.block[k] == null ? "----" : info.block[k].toString(16).padStart(4, "0")).join(" ");
    commLog(`Identity 0x0000..0x0005: ${blk}`, "info");
    commLog(`Ratings from ${info.limitsSource}: ${fmt(info.limits.vMax)} V, ${fmt(info.limits.iMax)} A, ${fmt(info.limits.oppMax)} W max.`, "info");
    commLog(`Scaling: ${info.dp[0]} dp V, ${info.dp[1]} dp A, ${info.dp[2]} dp W. Reads up to ${info.maxBlock} register(s).`, "info");
    info.notes.forEach(n => commLog(n, "warn"));
    reflectLimits();
    updateConnUI();
    startPolling();
  } catch (e) {
    if (e && e.name === "NotFoundError") { commLog("Port selection cancelled.", "info"); return; }
    commLog("Connect failed: " + (e.message || e), "err");
    showBanner("Could not connect: " + (e.message || e), "danger");
  }
}

async function disconnect(reason) {
  stopPolling();
  endRamp("disconnected");
  endCharge("disconnected", false);
  if (App.iv) App.iv.abort = true;
  if (App.psu) {
    try { if ($("offOnClose").checked) await App.psu.setOutput(false); } catch {}
  }
  if (App.io) { try { await App.io.close(); } catch {} }
  App.connected = false; App.psu = null; App.io = null;
  updateConnUI();
  commLog("Disconnected — " + (reason || "by user") + ".", "info");
}

function dropPort(reason) {
  // The port vanished mid-operation. Abandon everything, let go cleanly.
  stopPolling();
  endRamp("connection lost");
  endCharge("connection lost", false);
  if (App.iv) App.iv.abort = true;
  App.connected = false; App.psu = null;
  if (App.io) { try { App.io.close(); } catch {} App.io = null; }
  updateConnUI();
  commLog(reason, "err");
  showBanner("Connection lost — check the cable/adapter, then Connect again.", "danger");
}

/* ---- polling with port-loss recovery ------------------------------------- */
function startPolling() { if (App.polling) return; App.polling = true; scheduleTick(0); }
function stopPolling() { App.polling = false; clearTimeout(App.pollTimer); }
function scheduleTick(ms) { clearTimeout(App.pollTimer); App.pollTimer = setTimeout(tick, ms); }

let tickInFlight = false;
async function tick() {
  if (!App.polling || !App.psu || tickInFlight) return;
  tickInFlight = true;
  try {
    // refresh settings occasionally to catch front-panel knob changes
    if ((App._tickN = (App._tickN || 0) + 1) % 8 === 1) await App.psu.readSettings();
    const m = await App.psu.readMeasurement();
    onMeasurement(m);
  } catch (e) {
    if (e instanceof PortLostError) { dropPort(e.message); tickInFlight = false; return; }
    commLog("Poll error: " + (e.message || e), "err");
  }
  tickInFlight = false;
  if (App.polling) scheduleTick(App.pollMs);
}

function onMeasurement(m) {
  App.lastM = m;
  // readouts
  $("dispV").textContent = m.voltage.toFixed(2);
  $("dispA").textContent = m.current.toFixed(3);
  $("dispW").textContent = m.power.toFixed(2);
  $("dispR").textContent = m.current > 1e-4 ? (m.voltage / m.current).toFixed(2) : "—";
  if (App.psu.settings) { $("setVLbl").textContent = App.psu.settings.vSet.toFixed(2); $("setALbl").textContent = App.psu.settings.iSet.toFixed(3); }
  updateOutputUI(m.output);
  $("modeBadge").textContent = m.mode === "off" ? "—" : m.mode;
  $("modeBadge").className = "phase-badge" + (m.mode === "CV" || m.mode === "CC" ? " active" : "");

  // math channels
  const t = now();
  if (App.lastMathT > 0 && m.output) {
    const dtH = (t - App.lastMathT) / 3600000;
    App.energyWh += m.power * dtH; App.capacityAh += m.current * dtH;
  }
  App.lastMathT = t;
  $("dispE").textContent = App.energyWh.toFixed(3);
  $("dispC").textContent = App.capacityAh.toFixed(3);

  // protection — honest decoding
  const bad = faults(m.protection);
  PROT_BITS.forEach(([bit, name]) => { const el = $("lamp_" + name); if (el) el.classList.toggle("active", bit !== PROT_IDLE && !!(bad & bit)); });
  const raw = $("protRaw"); raw.textContent = "0x" + m.protection.toString(16).padStart(4, "0"); raw.classList.toggle("fault", !!bad);
  if (m.protection !== App.lastProt) {
    if (bad) commLog(`TRIP: ${protText(m.protection)} (0x0002 = 0x${m.protection.toString(16).padStart(4,"0")}). The instrument cut the output itself; the trip latches — power-cycle the supply.`, "err");
    else if (faults(App.lastProt)) commLog("Trip cleared.", "ok");
    App.lastProt = m.protection; App.protMoaned = false;
  }
  if (bad && m.output && !App.protMoaned) {
    commLog(`Output running with 0x0002 = 0x${m.protection.toString(16).padStart(4,"0")} — treat the lamps as a raw bit display, not a fault.`, "warn");
    App.protMoaned = true;
  }

  // chart
  App.chart.v.push(m.voltage); App.chart.a.push(m.current); App.chart.t.push(m.wall);
  while (App.chart.v.length > App.chartMax) { App.chart.v.shift(); App.chart.a.shift(); App.chart.t.shift(); }
  drawChart();

  checkAlarms(m);
  if (App.ramp) rampStep(m);
  if (App.charge) chargeStep(m);
  if (App.log && App.log.running && t - App.log.lastT >= App.log.intervalMs) { App.log.lastT = t; logSample(m); }
}

/* ---- basic control ------------------------------------------------------- */
async function guarded(fn) {
  try { await fn(); }
  catch (e) { if (e instanceof PortLostError) dropPort(e.message); else commLog(e.message || String(e), "err"); }
}

async function applySetpoints() {
  if (!App.psu) return;
  const v = parseFloat($("inV").value), a = parseFloat($("inA").value);
  await guarded(async () => {
    if (!isNaN(v)) { const set = await App.psu.setVoltage(v); commLog(`Set voltage ${set.toFixed(2)} V`, "ok"); }
    if (!isNaN(a)) { const set = await App.psu.setCurrent(a); commLog(`Set current ${set.toFixed(3)} A`, "ok"); }
    await App.psu.readSettings();
  });
}

async function setOutput(on, force = false) {
  if (!App.psu) return;
  if (!on) { endRamp("output off"); endCharge("output off", false); }
  await guarded(async () => {
    if (on && !force) {
      // Refuse a command certain to latch a trip: OVP at/below the setpoint,
      // or a trip already latched. Recovery is a power cycle — too costly to
      // stumble into from a button.
      const blockers = await App.psu.blockingFaults();
      const s = App.psu.settings;
      if (s && s.ovp <= s.vSet + 1e-9)
        blockers.push(`OVP (${s.ovp.toFixed(2)} V) is not above the setpoint (${s.vSet.toFixed(2)} V). The output would trip on contact, and the trip latches. Raise OVP first.`);
      if (blockers.length) {
        blockers.forEach(b => commLog(b, "err"));
        confirmModal("Output not switched on", blockers.join("\n\n") + "\n\nSend it anyway? If it trips you must power-cycle the supply.", () => setOutput(true, true));
        return;
      }
    }
    const r = await App.psu.setOutput(on);
    updateOutputUI(r.output);
    commLog(`Output ${r.output ? "ON" : "OFF"}`, r.output ? "ok" : "info");
  });
}

async function killOutput() { endRamp("killed"); endCharge("killed", false); if (App.iv) App.iv.abort = true; await guarded(async () => { await App.psu.setOutput(false); }); commLog("KILL — output off", "err"); }

async function applyProtection() {
  if (!App.psu) return;
  await guarded(async () => {
    const ovp = parseFloat($("inOVP").value), ocp = parseFloat($("inOCP").value), opp = parseFloat($("inOPP").value);
    if (!isNaN(ovp)) await App.psu.setOVP(ovp);
    if (!isNaN(ocp)) await App.psu.setOCP(ocp);
    if (!isNaN(opp)) await App.psu.setOPP(opp);
    const s = await App.psu.readSettings();
    $("inOVP").value = s.ovp.toFixed(2); $("inOCP").value = s.ocp.toFixed(3); $("inOPP").value = s.opp.toFixed(1);
    commLog(`Protection set — OVP ${s.ovp.toFixed(2)} V, OCP ${s.ocp.toFixed(3)} A, OPP ${s.opp.toFixed(1)} W`, "ok");
  });
}
async function readProtection() {
  if (!App.psu) return;
  await guarded(async () => {
    const s = await App.psu.readSettings();
    $("inOVP").value = s.ovp.toFixed(2); $("inOCP").value = s.ocp.toFixed(3); $("inOPP").value = s.opp.toFixed(1);
    commLog(`Protection read — OVP ${s.ovp.toFixed(2)} V, OCP ${s.ocp.toFixed(3)} A, OPP ${s.opp.toFixed(1)} W`, "info");
  });
}

/* ---- ramp ---------------------------------------------------------------- */
async function startRamp() {
  if (!App.psu || App.ramp || App.charge) { if (App.charge) commLog("A charge is running; stop it first.", "warn"); return; }
  const start = parseFloat($("rampStart").value), stop = parseFloat($("rampEnd").value);
  const step = Math.abs(parseFloat($("rampStep").value)), dwell = parseFloat($("rampDwell").value);
  await guarded(async () => {
    await App.psu.readSettings();
    const probs = rampProblems(start, stop, step, dwell, App.psu.limits, App.psu.settings, App.psu.vScale)
      .concat(await App.psu.blockingFaults());
    if (probs.length) { probs.forEach(p => commLog(p, "err")); showBanner(probs[0], "warn"); return; }
    const seq = rampRawSteps(start, stop, step, App.psu.vScale);
    App.ramp = { seq, i: 0, dwell, due: now() };
    commLog(`Ramp: ${start.toFixed(2)} → ${stop.toFixed(2)} V in ${fmt(step)} V steps, ${fmt(dwell)} s each — ${seq.length} steps.`, "ok");
    $("rampBtn").textContent = "Stop ramp";
    $("rampBar").max = seq.length; $("rampBar").value = 0;
  });
}
function endRamp(reason) {
  if (!App.ramp) return;
  const done = App.ramp.i >= App.ramp.seq.length;
  App.ramp = null;
  $("rampBtn").textContent = "Start ramp";
  $("rampStatus").textContent = "Idle — " + reason + ".";
  commLog("Ramp " + reason + ".", done ? "ok" : "warn");
}
async function rampStep(m) {
  const r = App.ramp; if (!r) return;
  if (faults(m.protection)) { endRamp("abandoned — tripped (" + protText(m.protection) + ")"); return; }
  if (!m.output) { endRamp("abandoned — output off"); return; }
  if (now() < r.due) return;
  if (r.i >= r.seq.length) { endRamp("finished"); return; }
  try {
    const volts = await App.psu.setVoltageRaw(r.seq[r.i]);
    r.i++; r.due = now() + r.dwell * 1000;
    $("rampBar").value = r.i;
    $("rampStatus").textContent = `step ${r.i}/${r.seq.length}  ${volts.toFixed(2)} V`;
  } catch (e) { if (e instanceof PortLostError) dropPort(e.message); else endRamp("bus error"); }
}

/* ---- charger ------------------------------------------------------------- */
const CHARGE_PROBE_A = 0.05, CHARGE_PROBE_MS = 1500, CHARGE_TERM_POLLS = 3;
function readChargeForm() {
  const chem = $("chChem").value;
  return {
    chem, cells: parseInt($("chCells").value) || 1,
    cellVmax: parseFloat($("chVmax").value) || CHEMISTRIES[chem].cellVmax,
    chargeCurrent: parseFloat($("chCurrent").value) || 1.0,
    termCurrent: parseFloat($("chTerm").value) || 0.05,
    timeoutMin: parseFloat($("chTimeout").value) || 240,
  };
}
async function startCharge() {
  if (!App.psu || App.charge || App.ramp) { if (App.ramp) commLog("A ramp is running; stop it first.", "warn"); return; }
  const p = readChargeForm();
  await guarded(async () => {
    await App.psu.readSettings();
    const probs = chargeProblems(p, App.psu.limits, App.psu.vScale, App.psu.iScale).concat(await App.psu.blockingFaults());
    if (probs.length) { probs.forEach(x => commLog(x, "err")); showBanner(probs[0], "warn"); return; }
    const target = chargeTarget(p);
    confirmModal("Start charging?",
      `About to charge ${p.cells} ${CHEMISTRIES[p.chem].label} cell(s) in series:\n\n    target ${target.toFixed(2)} V, at ${fmt(p.chargeCurrent)} A\n    finishing at ${fmt(p.termCurrent)} A, or ${fmt(p.timeoutMin)} min\n\nIs the battery connected, the right way round, and the cell count correct? The supply holds the target voltage and cannot exceed it — but check the pack first.`,
      () => beginCharge(p));
  });
}
async function beginCharge(p) {
  await guarded(async () => {
    const probe = Math.min(CHARGE_PROBE_A, p.termCurrent, p.chargeCurrent);
    await App.psu.setOVP(chargeOVP(p, App.psu.limits.vMax));
    await App.psu.setVoltage(chargeTarget(p));
    await App.psu.setCurrent(probe);
    await App.psu.readSettings();
    await App.psu.setOutput(true);
    App.charge = { p, phase: "probe", t0: now(), probeUntil: now() + CHARGE_PROBE_MS, lastT: now(), mah: 0, below: 0 };
    $("chBtn").textContent = "Stop charging";
    $("chTarget").textContent = chargeTarget(p).toFixed(2) + " V";
    $("chOVP").textContent = chargeOVP(p, App.psu.limits.vMax).toFixed(2) + " V";
    setChargeInputs(false);
    commLog(`Charge started: ${p.cells} ${CHEMISTRIES[p.chem].label} cell(s), target ${chargeTarget(p).toFixed(2)} V at ${fmt(p.chargeCurrent)} A, OVP ${chargeOVP(p, App.psu.limits.vMax).toFixed(2)} V.`, "ok");
    if (!CHEMISTRIES[p.chem].ccCvOk) commLog("⚠ " + CHEMISTRIES[p.chem].note, "warn");
    updateChargePhase("probing the pack…");
  });
}
function endCharge(reason, completed) {
  if (!App.charge) return;
  const mah = App.charge.mah;
  App.charge = null;
  $("chBtn").textContent = "Charge";
  setChargeInputs(true);
  updateChargePhase("Idle — " + reason + ".");
  commLog(`Charge ${reason}. Delivered ${mah.toFixed(0)} mAh.`, completed ? "ok" : "warn");
}
async function chargeStep(m) {
  const c = App.charge; if (!c) return; const p = c.p;
  const t = now(), dt = t - c.lastT; c.lastT = t;
  if (c.phase !== "probe" && m.output) c.mah += m.current * (dt / 3600000) * 1000;
  $("chElapsed").textContent = fmtClock((t - c.t0) / 1000);
  $("chCapacity").textContent = c.mah.toFixed(0) + " mAh";

  if (faults(m.protection)) { endCharge("ABANDONED — tripped (" + protText(m.protection) + ")", false); return; }
  if (!m.output && c.phase !== "probe") { endCharge("ABANDONED — output off", false); return; }
  if ((t - c.t0) > p.timeoutMin * 60000) {
    await guarded(async () => { await App.psu.setOutput(false); });
    endCharge(`stopped at the ${fmt(p.timeoutMin)} min timeout (taper never reached ${fmt(p.termCurrent)} A)`, false);
    return;
  }
  if (c.phase === "probe") {
    if (t >= c.probeUntil) {
      const verdict = batteryPreflight(p, m.voltage);
      if (verdict) { await guarded(async () => { await App.psu.setOutput(false); }); endCharge(verdict, false); return; }
      await guarded(async () => { await App.psu.setCurrent(p.chargeCurrent); await App.psu.readSettings(); });
      c.phase = "cc"; c.lastT = now();
      commLog(`Pack reads ${m.voltage.toFixed(2)} V — looks right. Charging at ${fmt(p.chargeCurrent)} A now.`, "ok");
      setChargePhaseBadge("cc");
    } else { updateChargePhase("probing the pack… " + m.voltage.toFixed(2) + " V"); }
    return;
  }
  const phase = m.mode === "CV" ? "cv" : "cc";
  c.phase = phase; setChargePhaseBadge(phase);
  if (phase === "cv" && m.current <= p.termCurrent) c.below++; else c.below = 0;
  if (c.below >= CHARGE_TERM_POLLS) {
    await guarded(async () => { await App.psu.setOutput(false); });
    endCharge(`complete — tapered to ${m.current.toFixed(3)} A (below ${fmt(p.termCurrent)} A)`, true);
    return;
  }
  updateChargePhase(phase === "cc" ? "CC — bulk" : "CV — tapering");
  $("chPhaseText").textContent = `${phase === "cc" ? "CC — bulk" : "CV — tapering"}  ${m.voltage.toFixed(2)} V, ${m.current.toFixed(3)} A`;
}
function setChargePhaseBadge(phase) {
  $("stCC").className = "phase-badge" + (phase === "cc" ? " active" : "");
  $("stCV").className = "phase-badge" + (phase === "cv" ? " active" : "");
}
function updateChargePhase(text) { $("chPhaseText").textContent = text; }
function setChargeInputs(enabled) { ["chChem","chCells","chVmax","chCurrent","chTerm","chTimeout"].forEach(id => $(id).disabled = !enabled); }

/* ---- I-V tracer ---------------------------------------------------------- */
async function runIV() {
  if (!App.psu || App.iv || App.charge || App.ramp) return;
  const startV = parseFloat($("ivStart").value), endV = parseFloat($("ivEnd").value);
  const step = Math.abs(parseFloat($("ivStep").value)), ilim = parseFloat($("ivIlim").value), dwell = parseFloat($("ivDwell").value);
  await guarded(async () => {
    await App.psu.readSettings();
    const probs = rampProblems(startV, endV, step, dwell, App.psu.limits, App.psu.settings, App.psu.vScale).concat(await App.psu.blockingFaults());
    if (probs.length) { probs.forEach(p => commLog(p, "err")); showBanner(probs[0], "warn"); return; }
    App.iv = { data: [], abort: false };
    $("ivRunBtn").disabled = true;
    commLog(`I-V sweep ${startV.toFixed(2)} → ${endV.toFixed(2)} V, ${fmt(step)} V steps at ${fmt(ilim)} A limit.`, "ok");
    try {
      await App.psu.setCurrent(ilim);
      await App.psu.setVoltageRaw(rampRawSteps(startV, startV, step, App.psu.vScale)[0]);
      await App.psu.setOutput(true);
      const seq = rampRawSteps(startV, endV, step, App.psu.vScale);
      for (const raw of seq) {
        if (App.iv.abort || !App.psu) break;
        await App.psu.setVoltageRaw(raw);
        await sleep(dwell * 1000);
        const m = await App.psu.readMeasurement();
        if (faults(m.protection)) { commLog("Sweep stopped — tripped.", "warn"); break; }
        App.iv.data.push({ v: m.voltage, a: m.current });
        drawIV();
      }
      await App.psu.setOutput(false);
      analyseIV();
    } catch (e) { if (e instanceof PortLostError) dropPort(e.message); else commLog("Sweep error: " + (e.message || e), "err"); }
    if (App.iv) { const d = App.iv.data; App.iv = null; App._ivData = d; }
    $("ivRunBtn").disabled = !App.connected;
  });
}
function analyseIV() {
  const d = App._ivData || (App.iv && App.iv.data) || [];
  if (d.length < 2) return;
  const vf = d.find(p => p.a >= 0.001);
  $("ivVf").textContent = vf ? vf.v.toFixed(3) + " V" : "—";
  let kneeV = "—", maxSlope = 0;
  for (let i = 1; i < d.length; i++) {
    const dv = d[i].v - d[i-1].v; if (dv <= 0) continue;
    const slope = (d[i].a - d[i-1].a) / dv;
    if (slope > maxSlope) { maxSlope = slope; kneeV = d[i].v.toFixed(3) + " V"; }
  }
  $("ivKnee").textContent = kneeV;
  const maxI = Math.max(...d.map(p => p.a)), half = maxI / 2;
  let rdyn = "—";
  for (let i = 1; i < d.length; i++) {
    if (d[i].a >= half) { const dv = d[i].v - d[i-1].v, di = d[i].a - d[i-1].a; if (di > 0) rdyn = (dv / di).toFixed(2) + " Ω"; break; }
  }
  $("ivRdyn").textContent = rdyn;
}

/* ---- alarms -------------------------------------------------------------- */
function checkAlarms(m) {
  if (!$("alarmEnable").checked) { clearAlarm(); return; }
  const vmin = parseFloat($("alVmin").value), vmax = parseFloat($("alVmax").value);
  const amin = parseFloat($("alAmin").value), amax = parseFloat($("alAmax").value);
  let trip = false;
  if (!isNaN(vmin) && m.voltage < vmin) trip = true;
  if (!isNaN(vmax) && m.voltage > vmax) trip = true;
  if (!isNaN(amin) && m.current < amin) trip = true;
  if (!isNaN(amax) && m.current > amax) trip = true;
  if (trip && !App.alarm.active) {
    App.alarm.active = true;
    $("alarmPill").style.display = ""; $("panelReadout").classList.add("flash");
    commLog("ALARM — reading outside bounds.", "err");
    if ($("alarmKill").checked && m.output) killOutput();
  } else if (!trip && App.alarm.active) clearAlarm();
}
function clearAlarm() { if (!App.alarm.active) return; App.alarm.active = false; $("alarmPill").style.display = "none"; $("panelReadout").classList.remove("flash"); }

/* ---- charts -------------------------------------------------------------- */
function drawChart() {
  const c = $("trendChart"); if (!c) return;
  const dpr = window.devicePixelRatio || 1, w = c.clientWidth, h = 200;

  const { v, a, t } = App.chart; if (v.length < 2) return;
  const padL = 44, padR = 44, padT = 10, padB = 20;
  const x0 = padL, x1 = w - padR, y0 = padT, y1 = h - padB;
  const vMax = Math.max(0.1, ...v) * 1.1, aMax = Math.max(0.01, ...a) * 1.1;
  const cGrid = cssVar("--border") || "#2a2f38", cV = cssVar("--accent") || "#4ecdc4", cA = cssVar("--amber") || "#ffb454";
  g.strokeStyle = cGrid; g.lineWidth = 1;
  for (let i = 0; i <= 4; i++) { const y = y0 + (y1 - y0) * i / 4; g.beginPath(); g.moveTo(x0, y); g.lineTo(x1, y); g.stroke(); }
  const plot = (arr, max, color) => {
    g.strokeStyle = color; g.lineWidth = 1.5; g.beginPath();
    arr.forEach((val, i) => { const x = x0 + (x1 - x0) * i / (arr.length - 1); const y = y1 - (y1 - y0) * (val / max); i ? g.lineTo(x, y) : g.moveTo(x, y); });
    g.stroke();
  };
  plot(v, vMax, cV); plot(a, aMax, cA);
  g.fillStyle = cV; g.font = "10px monospace"; g.textAlign = "right";
  for (let i = 0; i <= 4; i++) { const y = y0 + (y1 - y0) * i / 4; g.fillText((vMax * (1 - i / 4)).toFixed(1), x0 - 4, y + 3); }
  g.fillStyle = cA; g.textAlign = "left";
  for (let i = 0; i <= 4; i++) { const y = y0 + (y1 - y0) * i / 4; g.fillText((aMax * (1 - i / 4)).toFixed(2), x1 + 4, y + 3); }
}
function drawIV() {
  const c = $("ivChart"); if (!c) return;
  const d = (App.iv && App.iv.data) || App._ivData || [];
  const dpr = window.devicePixelRatio || 1, w = c.clientWidth, h = 200;
  c.width = w * dpr; c.height = h * dpr; c.style.height = h + "px";
  const g = c.getContext("2d"); g.setTransform(dpr, 0, 0, dpr, 0, 0); g.clearRect(0, 0, w, h);
  if (d.length < 2) return;
  const padL = 50, padR = 14, padT = 12, padB = 24;
  const x0 = padL, x1 = w - padR, y0 = padT, y1 = h - padB;
  let minV = Math.min(...d.map(p => p.v)), maxV = Math.max(...d.map(p => p.v));
  let maxI = Math.max(...d.map(p => p.a)); if (maxV === minV) maxV = minV + 0.5; if (maxI <= 0) maxI = 0.01;
  const cGrid = cssVar("--border") || "#2a2f38", cCurve = cssVar("--accent") || "#4ecdc4", cAxis = cssVar("--text-dim") || "#5f6368";
  g.strokeStyle = cGrid; g.lineWidth = 1;
  for (let i = 0; i <= 4; i++) { const y = y0 + (y1 - y0) * i / 4; g.beginPath(); g.moveTo(x0, y); g.lineTo(x1, y); g.stroke(); }
  g.strokeStyle = cCurve; g.lineWidth = 1.5; g.beginPath();
  d.forEach((p, i) => { const x = x0 + (x1 - x0) * (p.v - minV) / (maxV - minV); const y = y1 - (y1 - y0) * (p.a / maxI); i ? g.lineTo(x, y) : g.moveTo(x, y); });
  g.stroke();
  g.fillStyle = cAxis; g.font = "10px monospace"; g.textAlign = "right";
  for (let i = 0; i <= 4; i++) { const y = y0 + (y1 - y0) * i / 4; g.fillText((maxI * (1 - i / 4)).toFixed(3), x0 - 4, y + 3); }
  g.textAlign = "center";
  for (let i = 0; i <= 4; i++) { const x = x0 + (x1 - x0) * i / 4; g.fillText((minV + (maxV - minV) * i / 4).toFixed(1), x, h - 8); }
}

function logSample(m) {
  const row = { t: Date.now(), v: m.voltage, a: m.current, p: m.power, out: m.output, chg: App.charge ? App.charge.phase : "" };
  App.log.data.push(row);

  const tb = $("logTbody");

  tr.innerHTML = `<td>${el}</td><td>${m.voltage.toFixed(3)}</td><td>${m.current.toFixed(3)}</td><td>${m.power.toFixed(2)}</td><td>${m.output ? "ON" : "off"}</td>`;
  tb.insertBefore(tr, tb.firstChild);
  while (tb.children.length > 60) tb.removeChild(tb.lastChild);
  $("logCount").textContent = App.log.data.length + " pts";
}
function exportLog(kind) {
  if (!App.log || !App.log.data.length) { commLog("No log data.", "warn"); return; }
  let blob, name;
  if (kind === "csv") {
    const head = "timestamp_iso,elapsed_s,voltage_V,current_A,power_W,output,charge_phase\n";
    const rows = App.log.data.map(r => `${new Date(r.t).toISOString()},${((r.t - App.log.t0) / 1000).toFixed(2)},${r.v.toFixed(4)},${r.a.toFixed(4)},${r.p.toFixed(3)},${r.out ? 1 : 0},${r.chg}`).join("\n");
    blob = new Blob([head + rows], { type: "text/csv" }); name = "hm310t_log.csv";
  } else { blob = new Blob([JSON.stringify(App.log.data, null, 2)], { type: "application/json" }); name = "hm310t_log.json"; }

}

/* ---- sequence ------------------------------------------------------------ */
function renderSeq() {
  const tb = $("seqTbody"); tb.innerHTML = "";
  const s = App.seq || { steps: [] };
  s.steps.forEach((st, i) => {
    const tr = document.createElement("tr");
    if (s.running && s.i === i) tr.className = "active-step";
    tr.innerHTML = `<td>${i + 1}</td>
      <td><input type="number" step="0.01" value="${st.v}" data-i="${i}" data-k="v" style="width:70px"></td>
      <td><input type="number" step="0.01" value="${st.a}" data-i="${i}" data-k="a" style="width:70px"></td>
      <td><input type="number" step="0.1" value="${st.d}" data-i="${i}" data-k="d" style="width:60px"></td>
      <td><button class="row-del" data-del="${i}">×</button></td>`;
    tb.appendChild(tr);
  });
  tb.querySelectorAll("input").forEach(inp => inp.addEventListener("change", e => {
    const i = +e.target.dataset.i, k = e.target.dataset.k; App.seq.steps[i][k] = parseFloat(e.target.value) || 0;
  }));
  tb.querySelectorAll("[data-del]").forEach(b => b.addEventListener("click", e => { App.seq.steps.splice(+e.target.dataset.del, 1); renderSeq(); }));
}
function addSeqStep() { if (!App.seq) App.seq = { steps: [], running: false, i: 0 }; App.seq.steps.push({ v: 5, a: 1, d: 2 }); renderSeq(); }
async function playSeq() {
  if (!App.psu || !App.seq || !App.seq.steps.length || App.seq.running || App.charge || App.ramp) return;
  await guarded(async () => {
    await App.psu.readSettings();
    const hi = Math.max(...App.seq.steps.map(s => s.v));
    if (App.psu.settings.ovp <= hi) { showBanner(`A step reaches ${hi} V, not below OVP (${App.psu.settings.ovp.toFixed(2)} V). Raise OVP first — a trip latches.`, "warn"); return; }
    const bf = await App.psu.blockingFaults(); if (bf.length) { bf.forEach(b => commLog(b, "err")); return; }
    App.seq.running = true; App.seq.i = 0;
    $("seqStatus").textContent = "Running";
    await App.psu.setOutput(true);
    for (let i = 0; i < App.seq.steps.length; i++) {
      if (!App.seq.running || !App.psu) break;
      App.seq.i = i; renderSeq();
      const st = App.seq.steps[i];
      await App.psu.setCurrent(st.a); await App.psu.setVoltage(st.v); await App.psu.readSettings();
      commLog(`Step ${i + 1}: ${st.v} V, ${st.a} A for ${st.d} s`, "info");
      await sleep(st.d * 1000);
    }
    if (App.seq) { App.seq.running = false; $("seqStatus").textContent = "Idle"; renderSeq(); commLog("Sequence finished.", "ok"); }
  });
}
function stopSeq() { if (App.seq) { App.seq.running = false; $("seqStatus").textContent = "Idle"; renderSeq(); } commLog("Sequence stopped.", "info"); }
function genRamp() {
  const s = parseFloat($("genStart").value), e = parseFloat($("genEnd").value), st = Math.abs(parseFloat($("genStep").value)) || 1, d = parseFloat($("genDwell").value) || 2, a = parseFloat($("genI").value) || 1;
  const raws = rampRawSteps(s, e, st, 100);
  App.seq = { steps: raws.map(r => ({ v: +(r / 100).toFixed(2), a, d })), running: false, i: 0 };
  renderSeq(); commLog(`Generated ${raws.length}-step ramp.`, "ok");
}
